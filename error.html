<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found — Bang Labs</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .error-code {
            font-size: 6rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #c7d2fe, #6366f1, #06b6d4);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1;
            margin-bottom: 1rem;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 600;
            color: #e0e0e8;
            margin-bottom: 1rem;
        }

        .message {
            font-size: 1.05rem;
            line-height: 1.7;
            color: #9ca3b0;
            margin-bottom: 2.5rem;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.75rem 1.5rem;
            border: 1px solid rgba(99, 102, 241, 0.3);
            border-radius: 8px;
            color: #c7d2fe;
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 500;
            transition: background 0.2s, border-color 0.2s;
        }

        .back-link:hover {
            background: rgba(99, 102, 241, 0.1);
            border-color: rgba(99, 102, 241, 0.6);
        }
    </style>
</head>
<body data-page="error">
    <canvas id="bang"></canvas>
    <div class="bg-glow bg-glow--1"></div>
    <div class="bg-glow bg-glow--2"></div>

    <div class="container">
        <div class="error-code">404</div>
        <h1 data-i18n="error.heading">This page doesn't exist</h1>
        <p class="message" data-i18n="error.message">Looks like something went bang in the wrong place.</p>
        <a href="/" class="back-link" data-i18n="error.back">&#8592; Back to Bang Labs</a>
    </div>

    <script src="bang.js"></script>
    <script src="i18n.js"></script>
</body>
</html>

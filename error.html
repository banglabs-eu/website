<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found — Bang Labs</title>
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #0a0a0f;
            color: #e0e0e8;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .bg-glow {
            position: fixed;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.15;
            pointer-events: none;
        }

        .bg-glow--1 {
            top: -200px;
            left: -100px;
            background: #6366f1;
        }

        .bg-glow--2 {
            bottom: -200px;
            right: -100px;
            background: #06b6d4;
        }

        canvas#bang {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        .container {
            position: relative;
            text-align: center;
            padding: 2rem;
            max-width: 600px;
            opacity: 0;
            transform: scale(0.85);
            animation: reveal 0.6s ease-out 0.3s forwards;
        }

        @keyframes reveal {
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .error-code {
            font-size: 6rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #c7d2fe, #6366f1, #06b6d4);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1;
            margin-bottom: 1rem;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 600;
            color: #e0e0e8;
            margin-bottom: 1rem;
        }

        .message {
            font-size: 1.05rem;
            line-height: 1.7;
            color: #9ca3b0;
            margin-bottom: 2.5rem;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.75rem 1.5rem;
            border: 1px solid rgba(99, 102, 241, 0.3);
            border-radius: 8px;
            color: #c7d2fe;
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 500;
            transition: background 0.2s, border-color 0.2s;
        }

        .back-link:hover {
            background: rgba(99, 102, 241, 0.1);
            border-color: rgba(99, 102, 241, 0.6);
        }
    </style>
</head>
<body>
    <canvas id="bang"></canvas>
    <div class="bg-glow bg-glow--1"></div>
    <div class="bg-glow bg-glow--2"></div>

    <div class="container">
        <div class="error-code">404</div>
        <h1>This page doesn't exist</h1>
        <p class="message">Looks like something went bang in the wrong place.</p>
        <a href="/" class="back-link">&#8592; Back to Bang Labs</a>
    </div>

    <script>
        (function () {
            const canvas = document.getElementById('bang');
            const ctx = canvas.getContext('2d');
            let w, h;

            function resize() {
                w = canvas.width = window.innerWidth;
                h = canvas.height = window.innerHeight;
            }
            resize();
            window.addEventListener('resize', resize);

            const colors = ['#6366f1', '#818cf8', '#06b6d4', '#22d3ee', '#c7d2fe', '#ffffff'];
            const particles = [];
            let flash = 0;
            let animating = false;

            function bang(x, y) {
                flash = 1;

                for (let i = 0; i < 120; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const speed = 2 + Math.random() * 8;
                    particles.push({
                        x: x, y: y,
                        vx: Math.cos(angle) * speed,
                        vy: Math.sin(angle) * speed,
                        radius: 1.5 + Math.random() * 3,
                        color: colors[Math.floor(Math.random() * colors.length)],
                        alpha: 1,
                        decay: 0.008 + Math.random() * 0.012,
                        trail: []
                    });
                }

                for (let i = 0; i < 20; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const speed = 4 + Math.random() * 6;
                    particles.push({
                        x: x, y: y,
                        vx: Math.cos(angle) * speed,
                        vy: Math.sin(angle) * speed,
                        radius: 2 + Math.random() * 2,
                        color: '#ffffff',
                        alpha: 1,
                        decay: 0.015 + Math.random() * 0.01,
                        trail: [],
                        spark: true
                    });
                }

                if (!animating) {
                    animating = true;
                    requestAnimationFrame(animate);
                }
            }

            function animate() {
                ctx.clearRect(0, 0, w, h);

                if (flash > 0) {
                    ctx.fillStyle = `rgba(99, 102, 241, ${flash * 0.15})`;
                    ctx.fillRect(0, 0, w, h);
                    flash -= 0.03;
                }

                let alive = false;

                for (let i = particles.length - 1; i >= 0; i--) {
                    const p = particles[i];
                    if (p.alpha <= 0) {
                        particles.splice(i, 1);
                        continue;
                    }
                    alive = true;

                    p.trail.push({ x: p.x, y: p.y, alpha: p.alpha });
                    if (p.trail.length > 8) p.trail.shift();

                    for (let t = 0; t < p.trail.length; t++) {
                        const tp = p.trail[t];
                        const trailAlpha = (t / p.trail.length) * tp.alpha * 0.3;
                        ctx.globalAlpha = trailAlpha;
                        ctx.beginPath();
                        ctx.arc(tp.x, tp.y, p.radius * 0.6, 0, Math.PI * 2);
                        ctx.fillStyle = p.color;
                        ctx.fill();
                    }

                    ctx.globalAlpha = p.alpha;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                    ctx.fillStyle = p.color;
                    ctx.fill();

                    if (p.spark) {
                        ctx.beginPath();
                        ctx.arc(p.x, p.y, p.radius * 3, 0, Math.PI * 2);
                        ctx.fillStyle = p.color;
                        ctx.globalAlpha = p.alpha * 0.15;
                        ctx.fill();
                    }

                    ctx.globalAlpha = 1;

                    p.x += p.vx;
                    p.y += p.vy;
                    p.vx *= 0.985;
                    p.vy *= 0.985;
                    p.vy += 0.02;
                    p.alpha -= p.decay;
                }

                if (alive || flash > 0) {
                    requestAnimationFrame(animate);
                } else {
                    animating = false;
                }
            }

            bang(w / 2, h / 2);

            document.addEventListener('click', function (e) {
                bang(e.clientX, e.clientY);
            });
        })();
    </script>
</body>
</html>

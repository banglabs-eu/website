    <style>
        @keyframes shimmer {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        h1 {
            font-size: 3rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #c7d2fe, #6366f1, #06b6d4);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shimmer 3s ease-in-out infinite;
            margin-bottom: 1.5rem;
        }

        .tagline {
            font-size: 1.15rem;
            line-height: 1.7;
            color: #9ca3b0;
            margin-bottom: 2.5rem;
        }

        .links {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .links a {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.75rem 1.5rem;
            border: 1px solid rgba(99, 102, 241, 0.3);
            border-radius: 8px;
            color: #c7d2fe;
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 500;
            transition: background 0.2s, border-color 0.2s;
        }

        .links a:hover {
            background: rgba(99, 102, 241, 0.1);
            border-color: rgba(99, 102, 241, 0.6);
        }

        .links svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        .logo-text {
            font-family: monospace;
            font-size: 0.85rem;
            font-weight: 700;
            line-height: 1;
            letter-spacing: 0;
        }

        .glyphclock-footer {
            position: fixed;
            bottom: 1.5rem;
            right: 1.5rem;
            z-index: 20;
            text-decoration: none;
            opacity: 0;
            animation: reveal 0.6s ease-out 0.6s forwards;
        }

        .glyphclock-footer #gc {
            height: 80px;
            width: 80px;
            position: relative;
        }

        .glyphclock-footer .gc-glyph {
            position: absolute;
            font-size: 60px;
            line-height: 1;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%) scale(0);
            opacity: 0;
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1),
                        opacity 0.5s ease;
        }

        .glyphclock-footer .gc-1 .gc-glyph:nth-child(1) {
            transform: translate(-50%, -50%) scale(1);
            opacity: 1;
        }

        .glyphclock-footer .gc-2 .gc-glyph:nth-child(1) {
            transform: translate(calc(-50% - 20px), -50%) scale(0.6);
            opacity: 1;
        }
        .glyphclock-footer .gc-2 .gc-glyph:nth-child(2) {
            transform: translate(calc(-50% + 20px), -50%) scale(0.6);
            opacity: 1;
        }

        .glyphclock-footer .gc-3 .gc-glyph:nth-child(1) {
            transform: translate(-50%, calc(-50% - 15px)) scale(0.425);
            opacity: 1;
        }
        .glyphclock-footer .gc-3 .gc-glyph:nth-child(2) {
            transform: translate(calc(-50% - 15px), calc(-50% + 12px)) scale(0.425);
            opacity: 1;
        }
        .glyphclock-footer .gc-3 .gc-glyph:nth-child(3) {
            transform: translate(calc(-50% + 15px), calc(-50% + 12px)) scale(0.425);
            opacity: 1;
        }
    </style>
</head>

    <script>
    (function () {
        var S = ['\u{1F950}','\u{1F98B}','\u{1F337}','\u2602\uFE0F','\u{1F335}','\u{1F388}','\u{1F453}','\u2693','\u{1F99A}','\u{1F916}','\u2B50','\u2601\uFE0F','\u{1F332}','\u{1FA81}','\u{1FA91}','\u267B'];
        var el = document.getElementById('gc');
        var spans = el.querySelectorAll('.gc-glyph');
        function update() {
            var now = new Date();
            var m = now.getUTCHours() * 60 + now.getUTCMinutes();
            var block = Math.min(Math.floor(m / 90), 15);
            var sub = Math.min(Math.floor((m % 90) / 30), 2);
            var glyph = S[block];
            var count = sub + 1;
            for (var i = 0; i < 3; i++) spans[i].textContent = glyph;
            el.className = 'gc-' + count;
        }
        update();
        var now = new Date();
        var secsIntoBlock = (now.getUTCMinutes() % 30) * 60 + now.getUTCSeconds();
        setTimeout(function () { update(); setInterval(update, 30 * 60000); }, (30 * 60 - secsIntoBlock) * 1000);
    })();
    </script>

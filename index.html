<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bang Labs — Open Source Software Studio</title>
    <meta name="description" content="Bang Labs is an open source software studio. We build, share, and encourage involvement in open source projects.">
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #0a0a0f;
            color: #e0e0e8;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .bg-glow {
            position: fixed;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.15;
            pointer-events: none;
        }

        .bg-glow--1 {
            top: -200px;
            left: -100px;
            background: #6366f1;
        }

        .bg-glow--2 {
            bottom: -200px;
            right: -100px;
            background: #06b6d4;
        }

        .container {
            position: relative;
            text-align: center;
            padding: 2rem;
            max-width: 600px;
        }

        h1 {
            font-size: 3rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #c7d2fe, #6366f1, #06b6d4);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1.5rem;
        }

        .tagline {
            font-size: 1.15rem;
            line-height: 1.7;
            color: #9ca3b0;
            margin-bottom: 2.5rem;
        }

        .links {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .links a {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.75rem 1.5rem;
            border: 1px solid rgba(99, 102, 241, 0.3);
            border-radius: 8px;
            color: #c7d2fe;
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 500;
            transition: background 0.2s, border-color 0.2s;
        }

        .links a:hover {
            background: rgba(99, 102, 241, 0.1);
            border-color: rgba(99, 102, 241, 0.6);
        }

        .links svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        canvas#bang {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        .container {
            opacity: 0;
            transform: scale(0.85);
            animation: reveal 0.6s ease-out 0.3s forwards;
        }

        @keyframes reveal {
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
    </style>
</head>
<body>
    <canvas id="bang"></canvas>
    <div class="bg-glow bg-glow--1"></div>
    <div class="bg-glow bg-glow--2"></div>

    <div class="container">
        <h1>Bang Labs</h1>
        <p class="tagline">
            Open source software studio.<br>
            Building in the open, sharing ideas, and encouraging involvement.
        </p>
        <div class="links">
            <a href="https://github.com/banglabs-eu/" target="_blank" rel="noopener">
                <svg viewBox="0 0 16 16"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82a7.63 7.63 0 0 1 2-.27c.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8z"/></svg>
                GitHub
            </a>
            <a href="https://www.linkedin.com/in/akjems/" target="_blank" rel="noopener">
                <svg viewBox="0 0 16 16"><path d="M0 1.146C0 .513.526 0 1.175 0h13.65C15.474 0 16 .513 16 1.146v13.708c0 .633-.526 1.146-1.175 1.146H1.175C.526 16 0 15.487 0 14.854V1.146zm4.943 12.248V6.169H2.542v7.225h2.401zm-1.2-8.212c.837 0 1.358-.554 1.358-1.248-.015-.709-.52-1.248-1.342-1.248-.822 0-1.359.54-1.359 1.248 0 .694.521 1.248 1.327 1.248h.016zm4.908 8.212V9.359c0-.216.016-.432.08-.586.173-.431.568-.878 1.232-.878.869 0 1.216.662 1.216 1.634v3.865h2.401V9.25c0-2.22-1.184-3.252-2.764-3.252-1.274 0-1.845.7-2.165 1.193v.025h-.016l.016-.025V6.169h-2.4c.03.678 0 7.225 0 7.225h2.4z"/></svg>
                LinkedIn
            </a>
        </div>
    </div>
    <script>
        (function () {
            const canvas = document.getElementById('bang');
            const ctx = canvas.getContext('2d');
            let w, h;

            function resize() {
                w = canvas.width = window.innerWidth;
                h = canvas.height = window.innerHeight;
            }
            resize();
            window.addEventListener('resize', resize);

            const colors = ['#6366f1', '#818cf8', '#06b6d4', '#22d3ee', '#c7d2fe', '#ffffff'];
            const particles = [];
            let flash = 0;
            let animating = false;

            function bang(x, y) {
                flash = 1;

                for (let i = 0; i < 120; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const speed = 2 + Math.random() * 8;
                    particles.push({
                        x: x,
                        y: y,
                        vx: Math.cos(angle) * speed,
                        vy: Math.sin(angle) * speed,
                        radius: 1.5 + Math.random() * 3,
                        color: colors[Math.floor(Math.random() * colors.length)],
                        alpha: 1,
                        decay: 0.008 + Math.random() * 0.012,
                        trail: []
                    });
                }

                for (let i = 0; i < 20; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const speed = 4 + Math.random() * 6;
                    particles.push({
                        x: x,
                        y: y,
                        vx: Math.cos(angle) * speed,
                        vy: Math.sin(angle) * speed,
                        radius: 2 + Math.random() * 2,
                        color: '#ffffff',
                        alpha: 1,
                        decay: 0.015 + Math.random() * 0.01,
                        trail: [],
                        spark: true
                    });
                }

                if (!animating) {
                    animating = true;
                    requestAnimationFrame(animate);
                }
            }

            function animate() {
                ctx.clearRect(0, 0, w, h);

                if (flash > 0) {
                    ctx.fillStyle = `rgba(99, 102, 241, ${flash * 0.15})`;
                    ctx.fillRect(0, 0, w, h);
                    flash -= 0.03;
                }

                let alive = false;

                for (let i = particles.length - 1; i >= 0; i--) {
                    const p = particles[i];
                    if (p.alpha <= 0) {
                        particles.splice(i, 1);
                        continue;
                    }
                    alive = true;

                    p.trail.push({ x: p.x, y: p.y, alpha: p.alpha });
                    if (p.trail.length > 8) p.trail.shift();

                    for (let t = 0; t < p.trail.length; t++) {
                        const tp = p.trail[t];
                        const trailAlpha = (t / p.trail.length) * tp.alpha * 0.3;
                        ctx.globalAlpha = trailAlpha;
                        ctx.beginPath();
                        ctx.arc(tp.x, tp.y, p.radius * 0.6, 0, Math.PI * 2);
                        ctx.fillStyle = p.color;
                        ctx.fill();
                    }

                    ctx.globalAlpha = p.alpha;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                    ctx.fillStyle = p.color;
                    ctx.fill();

                    if (p.spark) {
                        ctx.beginPath();
                        ctx.arc(p.x, p.y, p.radius * 3, 0, Math.PI * 2);
                        ctx.fillStyle = p.color;
                        ctx.globalAlpha = p.alpha * 0.15;
                        ctx.fill();
                    }

                    ctx.globalAlpha = 1;

                    p.x += p.vx;
                    p.y += p.vy;
                    p.vx *= 0.985;
                    p.vy *= 0.985;
                    p.vy += 0.02;
                    p.alpha -= p.decay;
                }

                if (alive || flash > 0) {
                    requestAnimationFrame(animate);
                } else {
                    animating = false;
                }
            }

            // Initial bang from center
            bang(w / 2, h / 2);

            // Bang on every click at cursor position
            document.addEventListener('click', function (e) {
                bang(e.clientX, e.clientY);
            });
        })();
    </script>
</body>
</html>
